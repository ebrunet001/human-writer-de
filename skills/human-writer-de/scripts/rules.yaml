# DE notes:
# - Apostrophes/curly chars: the analyzer wraps each suspect-vocabulary phrase
#   with re.escape + \b...\b. German rarely uses apostrophes in running prose, so
#   the FR straight-vs-curly caveat is mostly moot here. For ai_constructions,
#   where a curly quote could appear, we keep a ['’] class only where needed.
# - Suspect vocabulary covers Tier 1 + Tier 2 (~170 entries). Tier 3 is
#   documented in references/tells-stylistic-de.md but excluded here:
#   false-positive risk on common German words is too high for a per-word matcher.
# - Word matching uses \b...\b. \w in Python's `re` (Unicode mode) includes the
#   German umlauts ä ö ü and ß, so entries like "bahnbrechend" / "Maßnahme" match.
# - The "—" em-dash threshold mirrors the master FR/EN value (1.0). CRITICAL
#   GERMAN NUANCE: the detector counts ONLY the em-dash "—" (U+2014), which is
#   foreign to German. The spaced en-dash "–" (U+2013, Halbgeviertstrich) is
#   NATIVE, CORRECT German typography for parenthetical asides and is NEVER
#   counted/flagged. The AI tell is the Anglo "—"; target 0, hard cap ≤ 1 per
#   1000 words.
# - straight_quote_max is the NEW DE typography threshold: the maximum number of
#   straight ASCII double-quote characters (") allowed in prose before the
#   detector flags. German uses the typographic pair „ " (Gänsefüßchen). Clean
#   native prose carries 0 straight ASCII quotes, so it never fires. Note that
#   strip_non_prose removes fenced code/tables first, so code-string and inch
#   marks are mostly gone before the count.
# - burstiness_min and comma_density_max are copied verbatim from the master
#   thresholds block; they are currently UNREAD by analyze.py (vestigial). Keep
#   them; do not treat their presence as a bug.
