  ai_constructions:
    # --- High severity (banned outright) ---
    - pattern: "Es geht nicht nur um .{1,40}, sondern um"
      severity: high
    - pattern: "Nicht nur .{1,40}, sondern auch"
      severity: high
    - pattern: "Tauchen Sie ein in"
      severity: high
    - pattern: "Tauchen wir ein in"
      severity: high
    - pattern: "Lassen Sie uns gemeinsam"
      severity: high
    - pattern: "In der heutigen Zeit"
      severity: high
    - pattern: "In der heutigen schnelllebigen Welt"
      severity: high
    - pattern: "Im digitalen Zeitalter"
      severity: high
    - pattern: "Im Zeitalter der KI"
      severity: high
    - pattern: "Stellen Sie sich eine Welt vor"
      severity: high
    - pattern: "Was wäre, wenn ich Ihnen sagen würde"
      severity: high
    - pattern: "Es ist wichtig zu beachten"
      severity: high
    - pattern: "Es sei darauf hingewiesen"
      severity: high
    - pattern: "Ohne jeden Zweifel"
      severity: high
    # --- Medium severity (rare-only) ---
    - pattern: "Egal, ob Sie .{1,40} oder"
      severity: medium
    - pattern: "Ganz gleich, ob Sie .{1,40} oder"
      severity: medium
    - pattern: "Schnallen Sie sich an"
      severity: medium
    - pattern: "Lassen Sie uns das aufschlüsseln"
      severity: medium
    - pattern: "Lassen Sie es mich erklären"
      severity: medium
    - pattern: "Kommen wir zur Sache"
      severity: medium
    - pattern: "Kurz gesagt,"
      severity: medium
    - pattern: "Sie fragen sich vielleicht"
      severity: medium
    - pattern: "Vielleicht fragen Sie sich"
      severity: medium
    - pattern: "Das Urteil ist eindeutig"
      severity: medium
    - pattern: "Die Schlussfolgerung liegt auf der Hand"
      severity: medium
    - pattern: "Abschließend lässt sich sagen"
      severity: medium
    - pattern: "Zusammenfassend lässt sich sagen"
      severity: medium
    - pattern: "Im Großen und Ganzen"
      severity: medium
    # --- Low severity (flag only at high frequency) ---
    - pattern: "Zusammenfassend,"
      severity: low
    - pattern: "Letztendlich,"
      severity: low
    - pattern: "Letztlich,"
      severity: low
    - pattern: "Fazit:"
      severity: low
  thresholds:
    # DE: the Anglo spaced em-dash "—" (U+2014) reads as an AI tell in expository
    # prose. CRITICAL: the NATIVE German spaced en-dash "–" (U+2013) is correct
    # and is NOT counted by detect_em_dashes. Target 0 for "—"; convert to
    # comma/colon/period/parentheses or to the native "–".
    em_dash_per_1000_words: 1.0
    burstiness_min: 8.0
    # Relaxed from 8.0 to 7.5 (2026-06-25): real native Wikipedia prose measured
    # stdev ~7.85 — a borderline false positive. The deliberate-AI fixture sits at
    # 9.5+ so the burstiness flag never fires on it; relaxing does not weaken it.
    sentence_stdev_min: 7.5
    lexical_diversity_min: 0.45
    comma_density_max: 2.0
    bullet_parallelism_max: 0.80
    # NEW DE typography detector: max number of straight ASCII double-quote (")
    # characters allowed in prose before flagging. German prose uses the
    # typographic pair „ " (Gänsefüßchen), so clean native prose carries 0
    # straight quotes and never fires. Set to 1 to tolerate a single stray
    # inch-mark/quote that survived strip_non_prose without false-firing.
    straight_quote_max: 1

content_type_weights:
  marketing:     {statistical: 1.0, stylistic: 1.0, structural: 1.0}
  short-comms:   {statistical: 0.6, stylistic: 1.2, structural: 0.5}
  technical:     {statistical: 0.5, stylistic: 0.7, structural: 0.3}
  editorial-seo: {statistical: 0.9, stylistic: 1.0, structural: 1.0}

verdict_bands:
  LOW_RISK: [0, 24]
  MEDIUM_RISK: [25, 49]
  HIGH_RISK: [50, 74]
  CRITICAL: [75, 100]
